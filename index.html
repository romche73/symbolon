<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта дня Симболон</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f6f8fc 0%, #e9edf6 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .app-container {
            text-align: center;
            max-width: 440px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #1a202c;
            font-size: 1.8rem;
            margin-bottom: 24px;
            font-weight: 700;
        }

        #draw-card-btn {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: #ffffff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
            transition: all 0.3s ease;
            outline: none;
        }

        #draw-card-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
        }

        #draw-card-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        }

        #card-display {
            width: 100%;
            box-sizing: border-box;
        }

        #card-display:not(:empty) {
            margin-top: 32px;
            background: #ffffff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.4s ease-out forwards;
        }

        #card-display img {
            max-width: 100%;
            height: auto;
            max-height: 380px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }

        #card-display h2 {
            color: #2d3748;
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 700;
        }

        #card-display p {
            color: #4a5568;
            font-size: 1rem;
            line-height: 1.6;
            margin: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Modal overlay and content styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-sizing: border-box;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-content p {
            color: #2d3748;
            font-size: 1rem;
            line-height: 1.6;
            margin-top: 0;
            margin-bottom: 24px;
        }

        #modal-close-btn {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            color: #ffffff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(118, 75, 162, 0.2);
            outline: none;
        }

        #modal-close-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(118, 75, 162, 0.3);
        }

        #modal-close-btn:active {
            transform: translateY(0);
        }

        /* Footer styles */
        .app-footer {
            text-align: center;
            padding: 24px 20px;
            width: 100%;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .app-footer p {
            color: #4a5568;
            font-size: 0.95rem;
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 400;
        }

        #telegram-btn {
            display: inline-block;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: #ffffff;
            background: #0088cc;
            padding: 10px 24px;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 136, 204, 0.25);
        }

        #telegram-btn:hover {
            background: #0077b3;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(0, 136, 204, 0.35);
        }

        #telegram-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <main class="main-content">
        <div class="app-container">
            <h1>Карта дня Симболон</h1>
            <button id="draw-card-btn">Вытянуть карту</button>
            <div id="card-display"></div>
        </div>
    </main>

    <footer class="app-footer">
        <p>Хотите получить глубокий индивидуальный расклад?</p>
        <a id="telegram-btn" href="#" target="_blank">Запустить Telegram-бота</a>
    </footer>

    <!-- Модальное окно предупреждения -->
    <div id="disclaimer-modal" class="modal-overlay">
        <div class="modal-content">
            <p>Первая карта — это ответ вашего подсознания. Повторные клики — это уже суета ума, пытающаяся найти "удобный" ответ. Но вы всё равно можете продолжить!</p>
            <button id="modal-close-btn">Я всё понимаю, продолжить</button>
        </div>
    </div>

    <script>
        const cardsDatabase = [
            {
                name: "Актер",
                description: "Сегодня вы должны сыграть какую-то роль (короля, начальника, ребенка и т.д.)",
                image: "images/actor.jpg"
            },
            {
                name: "Свадьба",
                description: "Хорошее настроение. Приятная компания. Удачный день",
                image: "images/wedding.jpg"
            },
            {
                name: "Вестник",
                description: "В этот день вас ожидают перемещения, короткие поездки, много общения, контактов...",
                image: "images/messenger.jpg"
            },
            {
                name: "Симболон",
                description: "Вам сегодня будет сопутствовать удача, особенно в коллективных делах...",
                image: "images/symbolon.jpg"
            },
            {
                name: "Черная Месса",
                description: "В сегодняшних мероприятиях вам отводится роль пешки",
                image: "images/black_mass.jpg"
            },
            {
                name: "Возлюбленная",
                description: "Этот день будет посвящен земным, материальным делам. В этот день хорошо заняться собой, своим внешним видом.",
                image: "images/beloved.jpg"
            },
            {
                name: "Несовместимость",
                description: "Осознайте и объедините мужское и женское в себе, для того чтобы обрести целостность.",
                image: "images/incompatibility.jpg"
            },
            {
                name: "Королевские Дети",
                description: "Сегодня вы, подобно Манилову, будете строить воздушные замки.",
                image: "images/royal_children.jpg"
            },
            {
                name: "Шут",
                description: "Сегодня можно сделать то, чего вы раньше никогда не делали, и получить от этого удовольствие или пользу. Приветствуются нестандартные решения.",
                image: "images/jester.jpg"
            },
            {
                name: "Эго",
                description: "Вы должны реализовать свой творческий потенциал, заняться любимым делом. Надо быть в центре внимания.",
                image: "images/ego.jpg"
            },
            {
                name: "Фортуна",
                description: "На редкость благоприятное стечение обстоятельств.",
                image: "images/fortune.jpg"
            }
        ];

        const drawButton = document.getElementById('draw-card-btn');
        const cardDisplay = document.getElementById('card-display');
        const modalOverlay = document.getElementById('disclaimer-modal');
        const modalCloseBtn = document.getElementById('modal-close-btn');

        let clickCount = 0;
        let disclaimerShown = false;

        function drawCard() {
            const randomIndex = Math.floor(Math.random() * cardsDatabase.length);
            const randomCard = cardsDatabase[randomIndex];
            cardDisplay.innerHTML = `
                <img src="${randomCard.image}" alt="${randomCard.name}" onerror="this.onerror=null; this.src='https://picsum.photos/300/400?random=${randomIndex}';">
                <h2><strong>${randomCard.name}</strong></h2>
                <p>${randomCard.description}</p>
            `;
        }

        drawButton.addEventListener('click', () => {
            clickCount++;
            if (clickCount === 2 && !disclaimerShown) {
                modalOverlay.classList.add('active');
            } else {
                drawCard();
            }
        });

        modalCloseBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
            disclaimerShown = true;
            drawCard();
        });
    </script>
</body>
</html>
