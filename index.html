            padding: 14px 28px;

            outline: none;
        }

        #draw-card-btn:hover {

        }

        #draw-card-btn:active {
            transform: translateY(0);

        }

            width: 100%;

            border-radius: 16px;

            border: 1px solid rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.4s ease-out forwards;
        }

        #card-display img {

            height: auto;
            max-height: 380px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);

            color: #2d3748;
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 700;
        }

        #card-display p {
            color: #4a5568;
            font-size: 1rem;
            line-height: 1.6;
            margin: 0;
        }

            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

            opacity: 1;
            pointer-events: auto;
        }

            height: 220px;
            margin-bottom: 24px;

            width: 100%;
            height: 100%;
            background-image: url('images/card_back.png');
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transform-origin: bottom center;
        }

        .card-1 {
            z-index: 3;
            animation: shuffle-top 1.5s infinite ease-in-out;
        }

        .card-2 {
            z-index: 2;
            transform: scale(0.95) translateY(-6px) rotate(-3deg);
            opacity: 0.8;
            animation: shuffle-mid 1.5s infinite ease-in-out;
        }

        .card-3 {
            z-index: 1;
            transform: scale(0.9) translateY(-12px) rotate(3deg);
            opacity: 0.6;
            animation: shuffle-bot 1.5s infinite ease-in-out;
        }

        .loader-text {
            color: #764ba2;
            font-size: 1.05rem;
            font-weight: 600;
            animation: pulse-text 1.5s infinite ease-in-out;
            margin: 0;

            0%, 100% { transform: scale(1) rotate(0deg); }
            33% { transform: scale(1.03) translate(-35px, -8px) rotate(-8deg); }
            66% { transform: scale(0.98) translate(8px, 4px) rotate(4deg); }

        const drawButton = document.getElementById('draw-card-btn');
        const cardDisplay = document.getElementById('card-display');
        const modalOverlay = document.getElementById('disclaimer-modal');
        const modalCloseBtn = document.getElementById('modal-close-btn');

        let clickCount = 0;
        let disclaimerShown = false;

        function drawCard() {
            // Блокируем кнопку на время анимации
            drawButton.disabled = true;
            
            // Показываем анимацию тусования карт
            cardDisplay.innerHTML = `
                <div class="shuffling-loader">
                    <div class="deck-animation">
                        <div class="loader-card card-1"></div>
                        <div class="loader-card card-2"></div>
                        <div class="loader-card card-3"></div>
                    </div>
                    <p class="loader-text">Получаю ответ Вселенной...</p>
                </div>
            `;

            // Ждем 3 секунды, затем показываем случайную карту
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * cardsDatabase.length);
                const randomCard = cardsDatabase[randomIndex];
                
                cardDisplay.innerHTML = `
                    <img src="${randomCard.image}" alt="${randomCard.name}" onerror="this.onerror=null; this.src='https://picsum.photos/300/400?random=${randomIndex}';">
                    <h2><strong>${randomCard.name}</strong></h2>
                    <p>${randomCard.description}</p>
                `;
                // Возвращаем активность кнопке
                drawButton.disabled = false;
            }, 3000);
        }

        drawButton.addEventListener('click', () => {
            clickCount++;
            if (clickCount === 2 && !disclaimerShown) {
                modalOverlay.classList.add('active');
            } else {
                drawCard();
            }
        });

        modalCloseBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
            disclaimerShown = true;
            drawCard();
        });
    </script>
