<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта дня Симболон</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f6f8fc 0%, #e9edf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            text-align: center;
            max-width: 440px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #1a202c;
            font-size: 1.8rem;
            margin-bottom: 24px;
            font-weight: 700;
        }

        #draw-card-btn {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: #ffffff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
            transition: all 0.3s ease;
            outline: none;
        }

        #draw-card-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
        }

        #draw-card-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        }

        #card-display {
            width: 100%;
            box-sizing: border-box;
        }

        #card-display:not(:empty) {
            margin-top: 32px;
            background: #ffffff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.4s ease-out forwards;
        }

        #card-display img {
            width: 100%;
            max-width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        #card-display h2 {
            color: #2d3748;
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 700;
        }

        #card-display p {
            color: #4a5568;
            font-size: 1rem;
            line-height: 1.6;
            margin: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>Карта дня Симболон</h1>
        <button id="draw-card-btn">Вытянуть карту</button>
        <div id="card-display"></div>
    </div>

    <script>
        const cardsDatabase = [
            {
                name: "Актер",
                description: "Сегодня вы должны сыграть какую-то роль (короля, начальника, ребенка и т.д.)",
                image: "images/actor.jpg"
            },
            {
                name: "Свадьба",
                description: "Хорошее настроение. Приятная компания. Удачный день",
                image: "images/wedding.jpg"
            },
            {
                name: "Вестник",
                description: "В этот день вас ожидают перемещения, короткие поездки, много общения, контактов...",
                image: "images/messenger.jpg"
            },
            {
                name: "Симболон",
                description: "Вам сегодня будет сопутствовать удача, особенно в коллективных делах...",
                image: "images/symbolon.jpg"
            },
            {
                name: "Черная Месса",
                description: "В сегодняшних мероприятиях вам отводится роль пешки",
                image: "images/black_mass.jpg"
            },
            {
                name: "Возлюбленная",
                description: "Этот день будет посвящен земным, материальным делам. В этот день хорошо заняться собой, своим внешним видом.",
                image: "images/beloved.jpg"
            },
            {
                name: "Несовместимость",
                description: "Осознайте и объедините мужское и женское в себе, для того чтобы обрести целостность.",
                image: "images/incompatibility.jpg"
            },
            {
                name: "Королевские Дети",
                description: "Сегодня вы, подобно Манилову, будете строить воздушные замки.",
                image: "images/royal_children.jpg"
            },
            {
                name: "Шут",
                description: "Сегодня можно сделать то, чего вы раньше никогда не делали, и получить от этого удовольствие или пользу. Приветствуются нестандартные решения.",
                image: "images/jester.jpg"
            },
            {
                name: "Эго",
                description: "Вы должны реализовать свой творческий потенциал, заняться любимым делом. Надо быть в центре внимания.",
                image: "images/ego.jpg"
            }
        ];

        const drawButton = document.getElementById('draw-card-btn');
        const cardDisplay = document.getElementById('card-display');

        drawButton.addEventListener('click', () => {
            const randomIndex = Math.floor(Math.random() * cardsDatabase.length);
            const randomCard = cardsDatabase[randomIndex];
            cardDisplay.innerHTML = `
                <img src="${randomCard.image}" alt="${randomCard.name}" onerror="this.onerror=null; this.src='https://picsum.photos/300/400?random=${randomIndex}';">
                <h2><strong>${randomCard.name}</strong></h2>
                <p>${randomCard.description}</p>
            `;
        });
    </script>
</body>
</html>
